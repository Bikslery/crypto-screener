version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cryptoscreener
      POSTGRES_USER: screener
      POSTGRES_PASSWORD: screener_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://screener:screener_pass@postgres:5432/cryptoscreener
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres

volumes:
  pgdata:
  redisdata:
