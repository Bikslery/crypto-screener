services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cryptoscreener
      POSTGRES_USER: screener
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-screener_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://screener:${POSTGRES_PASSWORD:-screener_pass}@postgres:5432/cryptoscreener
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      PORT: 3001
      ROLE: all
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
